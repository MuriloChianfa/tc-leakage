name: Packaging

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0, v1.2.0)'
        required: true

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

  deb:
    name: DEB (${{ matrix.distro }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    needs: version

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-22.04
            image: ubuntu:22.04
            goarch: amd64
            deb_arch: amd64
          - distro: ubuntu-24.04
            image: ubuntu:24.04
            goarch: amd64
            deb_arch: amd64
          - distro: debian-12
            image: debian:12
            goarch: amd64
            deb_arch: amd64
          - distro: debian-13
            image: debian:trixie
            goarch: amd64
            deb_arch: amd64
          - distro: ubuntu-24.04
            image: ubuntu:24.04
            goarch: arm64
            deb_arch: arm64

    steps:
      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y \
            git clang llvm libbpf-dev libelf-dev \
            make ca-certificates \
            dpkg-dev fakeroot

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build BPF object
        run: make bpf/netleak.o

      - name: Build Go binary
        run: make cmd GOARCH=${{ matrix.goarch }}

      - name: Build DEB package
        run: |
          PKG_DIR="$(pwd)/netleak_${{ needs.version.outputs.version }}_${{ matrix.deb_arch }}"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/lib/netleak"
          mkdir -p "${PKG_DIR}/DEBIAN"

          cp netleak "${PKG_DIR}/usr/bin/"
          cp bpf/netleak.o "${PKG_DIR}/usr/lib/netleak/"

          sed -e "s/{{VERSION}}/${{ needs.version.outputs.version }}/g" \
              -e "s/Architecture: amd64/Architecture: ${{ matrix.deb_arch }}/g" \
            pkg/deb/DEBIAN/control > "${PKG_DIR}/DEBIAN/control"

          cp pkg/deb/DEBIAN/postinst "${PKG_DIR}/DEBIAN/postinst"
          cp pkg/deb/DEBIAN/prerm "${PKG_DIR}/DEBIAN/prerm"
          chmod 755 "${PKG_DIR}/DEBIAN/postinst" "${PKG_DIR}/DEBIAN/prerm"

          dpkg-deb --build "${PKG_DIR}"

      - name: Verify DEB package
        run: dpkg-deb --info "netleak_${{ needs.version.outputs.version }}_${{ matrix.deb_arch }}.deb"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v7
        with:
          name: netleak-${{ matrix.distro }}-${{ matrix.deb_arch }}.deb
          path: "*.deb"

  rpm:
    name: RPM (${{ matrix.distro }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    needs: version

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora-40
            image: fedora:40
            goarch: amd64
            rpm_arch: x86_64
          - distro: fedora-40
            image: fedora:40
            goarch: arm64
            rpm_arch: aarch64

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            git clang llvm libbpf-devel elfutils-libelf-devel \
            make ca-certificates \
            rpm-build

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build BPF object
        run: make bpf/netleak.o

      - name: Build Go binary
        run: make cmd GOARCH=${{ matrix.goarch }}

      - name: Setup RPM build tree
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp netleak ~/rpmbuild/BUILD/
          cp bpf/netleak.o ~/rpmbuild/BUILD/
          cp LICENSE LICENSE-GPL ~/rpmbuild/BUILD/

      - name: Build RPM package
        run: |
          rpmbuild -bb \
            --target ${{ matrix.rpm_arch }} \
            --define "version ${{ needs.version.outputs.version }}" \
            --define "release 1" \
            --define "_topdir $HOME/rpmbuild" \
            --buildroot "$HOME/rpmbuild/BUILDROOT/netleak-${{ needs.version.outputs.version }}-1.${{ matrix.rpm_arch }}" \
            pkg/rpm/netleak.spec

      - name: Copy RPM to workspace
        run: find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} . \;

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: netleak-${{ matrix.distro }}-${{ matrix.rpm_arch }}.rpm
          path: "*.rpm"
