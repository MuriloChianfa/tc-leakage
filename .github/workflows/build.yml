name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            artifact_suffix: amd64
          - goarch: arm64
            artifact_suffix: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.sum

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev make

      - name: Build BPF object
        run: make bpf/netleak.o

      - name: Build Go binary
        run: make cmd GOARCH=${{ matrix.goarch }}

      - name: Verify artifacts
        run: |
          ls -lh netleak bpf/netleak.o
          file netleak
          file bpf/netleak.o

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: netleak-linux-${{ matrix.artifact_suffix }}
          path: |
            netleak
            bpf/netleak.o
