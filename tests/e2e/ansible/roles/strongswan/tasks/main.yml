#
# Set up a GRE tunnel between the root namespace and the vpn-server
# namespace, named vti0 to represent an IPsec-style tunnel interface.
# This tests netleak with a point-to-point tunnel interface.
---
- name: Load tunnel kernel modules
  ansible.builtin.shell: |
    modprobe ip_gre 2>/dev/null || true
    modprobe gre 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: true

- name: Create GRE tunnel on client side
  ansible.builtin.shell: |
    ip tunnel add vti0 mode gre \
      local {{ underlay_client_ip }} \
      remote {{ underlay_server_ip }}
    ip addr add {{ tunnel_client_ip }}/24 dev vti0
    ip link set vti0 up
  args:
    executable: /bin/bash

- name: Create GRE tunnel in server namespace
  ansible.builtin.shell: |
    ip netns exec {{ vpn_server_ns }} \
      ip tunnel add vti0 mode gre \
        local {{ underlay_server_ip }} \
        remote {{ underlay_client_ip }}
    ip netns exec {{ vpn_server_ns }} \
      ip addr add {{ tunnel_server_ip }}/24 dev vti0
    ip netns exec {{ vpn_server_ns }} \
      ip link set vti0 up
  args:
    executable: /bin/bash

- name: Verify tunnel connectivity
  ansible.builtin.command:
    cmd: ping -c 2 -W 3 {{ tunnel_server_ip }}
  register: vti_ping
  retries: 3
  delay: 2
  until: vti_ping.rc == 0

- name: Start HTTP listener in server namespace
  ansible.builtin.shell: |
    ip netns exec {{ vpn_server_ns }} sh -c \
      'cd /tmp && nohup python3 -m http.server {{ http_listen_port }} --bind 0.0.0.0 > /tmp/http.log 2>&1 &'
  args:
    executable: /bin/bash
