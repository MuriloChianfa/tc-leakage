#
# Simulates a SoftEther-style TAP VPN by creating a tap0 interface
# connected to the vpn-server namespace. Tests netleak with tap device naming.
---
- name: Create tap0 link to server namespace
  ansible.builtin.shell: |
    ip link add tap0 type veth peer name tap0-srv
    ip link set tap0-srv netns {{ vpn_server_ns }}

    ip addr add {{ tunnel_client_ip }}/24 dev tap0
    ip link set tap0 up

    ip netns exec {{ vpn_server_ns }} \
      ip addr add {{ tunnel_server_ip }}/24 dev tap0-srv
    ip netns exec {{ vpn_server_ns }} \
      ip link set tap0-srv up
  args:
    executable: /bin/bash

- name: Verify tap connectivity
  ansible.builtin.command:
    cmd: ping -c 2 -W 3 {{ tunnel_server_ip }}
  register: tap_ping
  retries: 3
  delay: 2
  until: tap_ping.rc == 0

- name: Start HTTP listener in server namespace
  ansible.builtin.shell: |
    ip netns exec {{ vpn_server_ns }} sh -c \
      'cd /tmp && nohup python3 -m http.server {{ http_listen_port }} --bind 0.0.0.0 > /tmp/http.log 2>&1 &'
  args:
    executable: /bin/bash
