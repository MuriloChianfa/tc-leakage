[defaults]
inventory = inventory.yml
roles_path = roles
host_key_checking = False
timeout = 30
stdout_callback = default
retry_files_enabled = False
gathering = smart

[callback_default]
result_format = yaml

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR
pipelining = True
